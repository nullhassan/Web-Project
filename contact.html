<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Ledgers | Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="brand-name">ELITE LEDGERS</div>
    <div class="nav-links">
        <a href="home.html" class="nav-btn">HOME</a>
        <a href="services.html" class="nav-btn">SERVICES</a>
        <a href="about.html" class="nav-btn">ABOUT</a>
        <a href="contact.html" class="nav-btn">CONTACT</a>
        <a href="login.html" class="nav-btn">LOGIN</a>
    </div>
</header>

<div class="content-wrapper">
    <section class="hero-section">
        <h1 class="hero-title">Contact Us</h1>
        <p class="hero-subtitle">Have a question or project idea? Send us a message and we will get back to you.</p>
    </section>

    <div class="form-container">
        <div class="form-box">
            <form id="contactForm">
                <div class="input-wrap">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" placeholder="Enter your full name" required>
                </div>
                <div class="input-wrap">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email address" required>
                </div>
                <div class="input-wrap">
                    <label for="message">Message</label>
                    <textarea id="message" placeholder="Write your message here..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">SEND MESSAGE</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
